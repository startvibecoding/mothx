name: Build and Push GHCR Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag for manual runs"
        required: false
        default: "manual"
      update_latest:
        description: "Also update latest/ubuntu tags"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: ubuntu
            target: runtime-ubuntu
          - variant: debian
            target: runtime-debian
          - variant: fedora
            target: runtime-fedora
          - variant: alpine
            target: runtime-alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        env:
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
          UPDATE_LATEST: ${{ inputs.update_latest }}
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME}"
          version=""
          tags=()

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME}"
            case "${{ matrix.variant }}" in
              ubuntu)
                tags+=("${image}:latest" "${image}:ubuntu")
                tags+=("${image}:${GITHUB_REF_NAME}" "${image}:${GITHUB_REF_NAME}-ubuntu")
                ;;
              *)
                tags+=("${image}:${GITHUB_REF_NAME}-${{ matrix.variant }}")
                ;;
            esac
          else
            version="${MANUAL_IMAGE_TAG:-manual}"
            if [[ -z "${version}" || "${version}" == "manual" ]]; then
              version="manual-${GITHUB_SHA::7}"
            fi
            case "${{ matrix.variant }}" in
              ubuntu)
                tags+=("${image}:${version}" "${image}:${version}-ubuntu")
                if [[ "${UPDATE_LATEST}" == "true" ]]; then
                  tags+=("${image}:latest" "${image}:ubuntu")
                fi
                ;;
              *)
                tags+=("${image}:${version}-${{ matrix.variant }}")
                ;;
            esac
          fi

          {
            echo "version=${version}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
