<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Ultra-simple terminal icon - bold black strokes on white -->
  
  <!-- Background -->
  <rect width="24" height="24" rx="4" fill="white" stroke="black" stroke-width="1.5"/>
  
  <!-- Terminal window -->
  <rect x="4" y="5" width="16" height="12" rx="2" fill="white" stroke="black" stroke-width="1.5"/>
  
  <!-- Title bar -->
  <rect x="4" y="5" width="16" height="4" rx="2" fill="white" stroke="black" stroke-width="1.5"/>
  
  <!-- Simple prompt symbol -->
  <text x="7" y="14" font-family="monospace" font-size="8" fill="black" font-weight="bold">>_</text>
  
  <!-- Cursor line -->
  <rect x="15" y="11" width="1" height="4" fill="black"/>
</svg>