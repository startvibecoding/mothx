<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1e293b"/>
  
  <!-- Terminal window -->
  <rect x="20" y="24" width="88" height="72" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  
  <!-- Title bar -->
  <rect x="20" y="24" width="88" height="16" rx="8" fill="#1e293b"/>
  <rect x="20" y="32" width="88" height="8" fill="#1e293b"/>
  
  <!-- Window dots -->
  <circle cx="32" cy="32" r="3" fill="#64748b"/>
  <circle cx="42" cy="32" r="3" fill="#64748b"/>
  <circle cx="52" cy="32" r="3" fill="#64748b"/>
  
  <!-- Code -->
  <text x="28" y="58" font-family="monospace" font-size="12" fill="#94a3b8">></text>
  <text x="38" y="58" font-family="monospace" font-size="11" fill="#e2e8f0">vc</text>
  
  <rect x="28" y="64" width="52" height="0.5" fill="#334155"/>
  
  <text x="28" y="80" font-family="monospace" font-size="9" fill="#4ade80">✓ Ready</text>
  
  <!-- Cursor -->
  <rect x="28" y="86" width="7" height="10" fill="#94a3b8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
</svg>
