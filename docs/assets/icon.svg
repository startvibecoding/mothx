<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Terminal window -->
  <g transform="translate(96, 80)">
    <!-- Window frame -->
    <rect x="0" y="0" width="320" height="240" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    
    <!-- Title bar -->
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#1e293b"/>
    <rect x="0" y="28" width="320" height="12" fill="#1e293b"/>
    
    <!-- Window buttons -->
    <circle cx="24" cy="20" r="6" fill="#64748b"/>
    <circle cx="44" cy="20" r="6" fill="#64748b"/>
    <circle cx="64" cy="20" r="6" fill="#64748b"/>
    
    <!-- Code content -->
    <text x="24" y="76" font-family="monospace" font-size="18" fill="#94a3b8">></text>
    <text x="44" y="76" font-family="monospace" font-size="18" fill="#e2e8f0"> vibecoding</text>
    
    <rect x="24" y="96" width="240" height="1" fill="#334155"/>
    
    <text x="24" y="126" font-family="monospace" font-size="14" fill="#64748b">Analyzing project...</text>
    
    <text x="24" y="156" font-family="monospace" font-size="14" fill="#4ade80">✓</text>
    <text x="44" y="156" font-family="monospace" font-size="14" fill="#94a3b8"> 12 files processed</text>
    
    <text x="24" y="180" font-family="monospace" font-size="14" fill="#4ade80">✓</text>
    <text x="44" y="180" font-family="monospace" font-size="14" fill="#94a3b8"> Ready</text>
    
    <!-- Cursor -->
    <rect x="24" y="200" width="10" height="18" fill="#94a3b8" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Brand text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="600" fill="#e2e8f0" letter-spacing="-1">VibeCoding</text>
  
  <!-- Tagline -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b" letter-spacing="3">AI CODING ASSISTANT</text>
  
  <!-- Decorative line -->
  <rect x="176" y="455" width="160" height="1" fill="#334155"/>
</svg>
